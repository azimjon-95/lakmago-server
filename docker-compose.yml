services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      MONGO_URI: mongodb://mongo:27017/lokmago
      JWT_SECRET: change-me-in-production
      CLIENT_ORIGIN: http://localhost:5173
    command: npm start

volumes:
  mongo_data:
